# Imperial Geass Noir kitty profile

include ~/.config/kitty/themes/imperial-geass-noir.conf

font_family IBM Plex Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5

background_opacity 0.92
window_padding_width 10
confirm_os_window_close 0
cursor_shape beam

tab_bar_style powerline
tab_powerline_style slanted
active_tab_background #241D36
active_tab_foreground #E8E1D2
inactive_tab_background #0D0B12
inactive_tab_foreground #A49AAD
tab_bar_background #07070B
tab_title_template " {title} "
